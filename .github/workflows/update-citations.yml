name: Update Citation Count

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight UTC
  workflow_dispatch:     # Allows you to trigger it manually for testing

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Python script
        env:
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: python _publications/ExtractCitation.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.json
          # Only commit if the file has actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update citation count" && git push)